[project]
name = "mama-contracts"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.6"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["python/mama_contracts"]

[dependency-groups]
dev = ["datamodel-code-generator>=0.25", "pytest>=8"]
